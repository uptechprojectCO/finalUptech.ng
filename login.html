<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | UpTech Voting</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family: "Inter", sans-serif;
min-height:100vh;

background:
linear-gradient(rgba(15,23,42,.65), rgba(15,23,42,.65)),
url("https://th.bing.com/th/id/OIP.LWZRVXUsm8_gzAkhwGoxogHaEc?w=246&h=180&c=7&r=0&o=7&pid=1.7&rm=3");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
align-items:center;
justify-content:center;
}

/* Glass Card */

.glass{
background:rgba(255,255,255,.95);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.3);

box-shadow:
0 25px 60px rgba(0,0,0,.35),
inset 0 1px 0 rgba(255,255,255,.6);
}

/* Inputs */

.input-wrap{
position:relative;
}

.input-icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#6b7280;
font-size:14px;
}

input{
padding-left:38px;
transition:all .25s ease;
}

input:focus{
transform:scale(1.02);
box-shadow:0 0 0 3px rgba(59,130,246,.25);
border-color:#3b82f6;
}

/* Button */

.login-btn{
background:linear-gradient(135deg,#2563eb,#1e40af);
transition:all .25s ease;
}

.login-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.25);
background:linear-gradient(135deg,#1d4ed8,#1e3a8a);
}

</style>
</head>

<body>

<div class="glass p-8 rounded-2xl shadow-lg w-full max-w-sm">

<div class="text-center mb-6">

<div class="inline-block p-3 rounded-full bg-blue-600 text-white mb-3">
🔐
</div>

<h2 class="text-2xl font-bold text-blue-900">
UpTech Voting
</h2>

<p class="text-sm text-gray-500">
Secure Voter Login
</p>

</div>

<div class="space-y-4">

<div class="input-wrap">
<span class="input-icon"></span>
<input type="email" id="loginEmail" placeholder="Email"
class="w-full px-4 py-2 border rounded-lg outline-none">
</div>

<div class="input-wrap">
<span class="input-icon"></span>
<input type="password" id="loginPass" placeholder="Password"
class="w-full px-4 py-2 border rounded-lg outline-none">
</div>

<button onclick="handleLogin()"
class="login-btn w-full text-white py-2 rounded-lg font-bold">
Sign In
</button>

</div>

</div>

<script>

function handleLogin() {

const stored = JSON.parse(localStorage.getItem('voterUser'));
const email = document.getElementById('loginEmail').value;
const pass = document.getElementById('loginPass').value;

if (stored && email === stored.email && pass === stored.password) {

window.location.href = 'user-admin.html';

} else {

alert("Invalid Credentials!");

}

}

</script>

</body>
</html>
