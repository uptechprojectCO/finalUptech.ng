<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pending Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="max-w-md text-center p-10 bg-white rounded-3xl shadow-xl border border-blue-50">
        <div class="flex justify-center mb-6">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600"></div>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Request Under Review</h2>
        <p class="text-gray-600 leading-relaxed mb-6">
            Thank you for registering. Your sign-up request is currently being reviewed by our admin team for UpTech eligibility. you will recieve an email with ur dashboard link lol
        </p>
        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
            <p class="text-sm text-blue-800 font-medium">Estimated Confirmation Time:</p>
            <p id="time-display" class="text-xl font-bold text-blue-600 mt-1"></p>
            <p class="text-[10px] text-blue-400 mt-2">Maximum wait time: 5 hours</p>
        </div>
    </div>

    <script>
        const now = new Date();
        now.setHours(now.getHours() + 5);

        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('time-display').innerText = "Check back at " + timeString;
    </script>
</body>
</html>
